name: Unit macOS

on:
  push:

concurrency:
  group: macos-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  SEQAN3_NO_VERSION_CHECK: 1
  TZ: Europe/Berlin

defaults:
  run:
    shell: bash -Eexuo pipefail {0}

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: macos-latest # arm64
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "clang17"
            compiler: "clang-17"
            build: unit
            build_type: Release
            cxx_flags: "-stdlib=libc++" # For verbosity. This is already the default.

          - name: "gcc13"
            compiler: "gcc-13"
            build: unit
            build_type: Release
            cxx_flags: "-std=c++23"

    steps:
      - name: Checkout SeqAn3
        uses: actions/checkout@v4
        with:
          path: seqan3
          fetch-depth: 1
          submodules: true

      - name: Checkout SeqAn2
        uses: actions/checkout@v4
        with:
          repository: seqan/seqan
          path: seqan3/submodules/seqan
          fetch-depth: 1

      - name: Setup toolchain
        uses: seqan/actions/setup-toolchain@main
        with:
          compiler: ${{ matrix.compiler }}
          ccache_size: 75M

      - name: Debug
        run: |
          xcode-select --version
          xcodebuild -version
          pkgutil --pkg-info=com.apple.pkg.CLTools_Executables | grep version
          sudo xcode-select --switch /Library/Developer/CommandLineTools/
          xcode-select --version
          xcodebuild -version
          pkgutil --pkg-info=com.apple.pkg.CLTools_Executables | grep version

      - name: Configure tests
        continue-on-error: true
        run: |
          mkdir seqan3-build
          cd seqan3-build
          cmake ../seqan3/test/${{ matrix.build }} -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
                                                   -DCMAKE_CXX_FLAGS="${{ matrix.cxx_flags }}" \
                                                   -DSEQAN3_VERBOSE_TESTS=OFF
          make -j3 gtest_build

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3

      - name: Build tests
        run: |
          ccache -z
          cd seqan3-build
          make -k -j3
          ccache -sv

      - name: Run tests
        run: |
          cd seqan3-build
          ctest . -j3 --output-on-failure
